name: Node.js CI

on:
  pull_request:
    [cite_start]branches: [ main ] # Runs on pull requests to main [cite: 12, 52]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - [cite_start]uses: actions/checkout@v4 # Checks out code [cite: 54]
    - name: Use Node.js
      [cite_start]uses: actions/setup-node@v4 # Sets up Node.js [cite: 54]
      with:
        node-version: '20'
    - [cite_start]run: npm install # Runs npm install [cite: 54]
    - [cite_start]run: npm test # Runs npm test [cite: 54]
