name: Node.js CD

on:
  push:
    [cite_start]branches: [ main ] # Runs on push to main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Simulate Deployment
      env:
        [cite_start]DEPLOY_TOKEN: ${{ secrets.DEPLOY_KEY }} # Uses the secret you created 
      run: |
        echo "Deploying to staging server..." # Simulates deployment [cite: 60]
        echo "Successfully deployed Node.js app!"
